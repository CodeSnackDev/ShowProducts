<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Premium Store</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/darkmode.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
  <style>
    @media (max-width: 768px) {
      .products-layout {
        grid-template-columns: 1fr !important;
      }
      .filters-sidebar {
        position: static !important;
        margin-bottom: 20px;
      }
      .search-header {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 10px !important;
      }
      .search-header input {
        max-width: 100% !important;
      }
    }
    @media (max-width: 480px) {
      .filters-sidebar {
        padding: 15px !important;
      }
      #pagination {
        gap: 5px !important;
      }
      #pagination button {
        padding: 6px 12px !important;
        font-size: 0.85rem !important;
      }
    }
  </style>
</head>
<body>
  <header class="header" role="banner">
    <div class="container header-grid">
      <div class="logo"><a href="index.html">✨ brand</a></div>
      <nav class="nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html" data-i18n="nav.home">Home</a></li>
          <li><a href="products.html" data-i18n="nav.products">Products</a></li>
          <li><a href="categories.html" data-i18n="nav.categories">Categories</a></li>
          <li><a href="about.html" data-i18n="nav.about">About</a></li>
          <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="icon-btn theme-toggle" aria-label="Toggle theme" id="themeToggle">🌓</button>
        <button class="icon-btn lang-toggle" aria-label="Toggle language" id="langToggle">🇲🇲</button>
        <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">❤️ <span id="wishlistCount" class="badge">0</span></a>
      </div>
    </div>
  </header>

  <main>
    <div class="container" style="padding-top:30px;padding-bottom:40px;">
      <!-- Header with search -->
      <div class="section-header search-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;">
        <h1 data-i18n="product.details" style="font-size:2rem;">All Products</h1>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="searchInput" placeholder="Search products..." class="search-input" style="min-width:200px;max-width:280px;" data-i18n-placeholder="search.placeholder">
          <span id="resultCount" style="font-size:0.9rem;color:var(--gray);"></span>
        </div>
      </div>

      <!-- Products Layout -->
      <div class="products-layout" style="display:grid;grid-template-columns:260px 1fr;gap:30px;margin-top:20px;">
        
        <!-- Filters Sidebar -->
        <aside class="filters filters-sidebar" style="background:var(--white);padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);height:fit-content;position:sticky;top:90px;transition:all 0.3s;">
          <h3 data-i18n="filter.title" style="margin-bottom:20px;font-size:1.2rem;">Filter Products</h3>
          <form id="filterForm">
            <!-- Category -->
            <div style="margin-bottom:16px;">
              <label data-i18n="filter.category" style="display:block;font-weight:500;font-size:0.9rem;margin-bottom:4px;">Category</label>
              <select id="filterCategory" name="category" class="search-input" style="width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-light);background:var(--white);">
                <option value="">All Categories</option>
              </select>
            </div>
            
            <!-- Brand -->
            <div style="margin-bottom:16px;">
              <label data-i18n="filter.brand" style="display:block;font-weight:500;font-size:0.9rem;margin-bottom:4px;">Brand</label>
              <select id="filterBrand" name="brand" class="search-input" style="width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-light);background:var(--white);">
                <option value="">All Brands</option>
              </select>
            </div>
            
            <!-- Price Range -->
            <div style="margin-bottom:16px;">
              <label data-i18n="filter.price" style="display:block;font-weight:500;font-size:0.9rem;margin-bottom:4px;">Price Range</label>
              <select id="filterPrice" name="priceRange" class="search-input" style="width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-light);background:var(--white);">
                <option value="0-10000">All Prices</option>
                <option value="0-50">Under $50</option>
                <option value="50-100">$50 - $100</option>
                <option value="100-200">$100 - $200</option>
                <option value="200-500">$200 - $500</option>
                <option value="500-10000">$500+</option>
              </select>
            </div>
            
            <!-- Rating -->
            <div style="margin-bottom:16px;">
              <label data-i18n="filter.rating" style="display:block;font-weight:500;font-size:0.9rem;margin-bottom:4px;">Min Rating</label>
              <select id="filterRating" name="minRating" class="search-input" style="width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-light);background:var(--white);">
                <option value="0">All</option>
                <option value="4">4+ ⭐</option>
                <option value="4.5">4.5+ ⭐</option>
                <option value="4.8">4.8+ ⭐</option>
              </select>
            </div>
            
            <!-- Availability -->
            <div style="margin-bottom:16px;">
              <label data-i18n="filter.availability" style="display:block;font-weight:500;font-size:0.9rem;margin-bottom:4px;">Availability</label>
              <select id="filterAvailability" name="availability" class="search-input" style="width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-light);background:var(--white);">
                <option value="">All</option>
                <option value="in-stock">In Stock</option>
                <option value="out-of-stock">Out of Stock</option>
              </select>
            </div>
            
            <!-- Sort -->
            <div style="margin-bottom:20px;">
              <label data-i18n="filter.sort" style="display:block;font-weight:500;font-size:0.9rem;margin-bottom:4px;">Sort By</label>
              <select id="filterSort" name="sort" class="search-input" style="width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-light);background:var(--white);">
                <option value="newest" data-i18n="sort.newest">Newest</option>
                <option value="oldest" data-i18n="sort.oldest">Oldest</option>
                <option value="price-low" data-i18n="sort.priceLow">Price: Low to High</option>
                <option value="price-high" data-i18n="sort.priceHigh">Price: High to Low</option>
                <option value="az" data-i18n="sort.az">A-Z</option>
                <option value="za" data-i18n="sort.za">Z-A</option>
                <option value="rating" data-i18n="sort.rating">Best Rating</option>
              </select>
            </div>
            
            <button type="button" id="resetFilters" class="btn btn-outline" style="width:100%;padding:12px;font-weight:600;" data-i18n="filter.reset">Reset Filters</button>
          </form>
        </aside>

        <!-- Results Area -->
        <div>
          <div id="productResults" class="product-grid" style="min-height:300px;"></div>
          <div id="pagination" style="display:flex;justify-content:center;margin-top:30px;gap:8px;flex-wrap:wrap;"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer-grid">
      <div>© 2026 Premium Store</div>
      <div class="footer-links">
        <a href="about.html" data-i18n="nav.about">About</a>
        <a href="contact.html" data-i18n="nav.contact">Contact</a>
        <a href="#" data-i18n="footer.privacy">Privacy</a>
      </div>
    </div>
  </footer>

  <button class="back-top" id="backToTop" aria-label="Back to top">⬆</button>

  <!-- JavaScript Files -->
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/language.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/wishlist.js"></script>
  <script src="assets/js/filter.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/main.js"></script>
  
  <script>
    (async function init() {
      try {
        console.log('🚀 Products page initializing...');
        
        // Load data first
        await loadProductsAndCategories();
        console.log(`✅ Loaded ${app.products.length} products`);
        
        // Load wishlist
        loadWishlist();
        updateWishlistBadge();
        
        // Initialize theme
        initTheme();
        
        // Initialize language
        initLanguage();
        
        // Initialize filters
        initFilters();
        
        // Initialize search (for products page)
        if (typeof initSearch === 'function') {
          initSearch();
        }
        
        // Handle search from URL
        if (typeof handleSearchFromURL === 'function') {
          handleSearchFromURL();
        }
        
        console.log('✅ Products page initialized successfully');
      } catch (error) {
        console.error('❌ Error initializing products page:', error);
      }
    })();
  </script>
</body>
</html>
