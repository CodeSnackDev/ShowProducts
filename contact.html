<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Premium Store</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/darkmode.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header" role="banner">
    <div class="container header-grid">
      <div class="logo"><a href="index.html">✨ brand</a></div>
      <nav class="nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html" data-i18n="nav.home">Home</a></li>
          <li><a href="products.html" data-i18n="nav.products">Products</a></li>
          <li><a href="categories.html" data-i18n="nav.categories">Categories</a></li>
          <li><a href="about.html" data-i18n="nav.about">About</a></li>
          <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="icon-btn theme-toggle" aria-label="Toggle theme" id="themeToggle">🌓</button>
        <button class="icon-btn lang-toggle" aria-label="Toggle language" id="langToggle">🇲🇲</button>
        <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">❤️ <span id="wishlistCount" class="badge">0</span></a>
      </div>
    </div>
  </header>

  <main>
    <div class="container" style="padding:60px 0;max-width:600px;margin:0 auto;">
      <h1>Contact Us</h1>
      <p style="color:var(--gray);margin:20px 0;">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
      <form onsubmit="event.preventDefault();alert('✅ Thank you! We\'ll get back to you soon.');" style="background:var(--white);padding:30px;border-radius:var(--radius);box-shadow:var(--shadow);">
        <div style="margin-bottom:15px;">
          <label>Your Name</label>
          <input type="text" placeholder="John Doe" required class="search-input" style="width:100%;margin-top:5px;">
        </div>
        <div style="margin-bottom:15px;">
          <label>Email Address</label>
          <input type="email" placeholder="john@example.com" required class="search-input" style="width:100%;margin-top:5px;">
        </div>
        <div style="margin-bottom:15px;">
          <label>Message</label>
          <textarea rows="5" placeholder="Your message here..." required class="search-input" style="width:100%;margin-top:5px;resize:vertical;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Send Message</button>
      </form>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer-grid">
      <div>© 2026 Premium Store</div>
      <div class="footer-links">
        <a href="about.html" data-i18n="nav.about">About</a>
        <a href="contact.html" data-i18n="nav.contact">Contact</a>
        <a href="#" data-i18n="footer.privacy">Privacy</a>
      </div>
    </div>
  </footer>

  <button class="back-top" id="backToTop" aria-label="Back to top">⬆</button>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/language.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/wishlist.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    (async function init() {
      await loadProductsAndCategories();
      loadWishlist();
      updateWishlistBadge();
    })();
  </script>
</body>
</html>
